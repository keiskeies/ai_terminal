<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A24"/>
      <stop offset="100%" stop-color="#13131B"/>
    </linearGradient>
  </defs>
  <!-- Terminal window frame -->
  <rect x="40" y="24" width="160" height="112" rx="14" fill="url(#frameGrad)" stroke="#272735" stroke-width="1.5"/>
  <!-- Window title bar dots -->
  <circle cx="62" cy="44" r="4" fill="#C8161D"/>
  <circle cx="78" cy="44" r="4" fill="#EB5C20"/>
  <circle cx="94" cy="44" r="4" fill="#6ECC54"/>
  <!-- Command prompt -->
  <path d="M58 72 L74 84 L58 96" fill="none" stroke="#3B7DFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="78" y="90" width="20" height="3" rx="1.5" fill="#6ECC54"/>
  <!-- Dashed connection line -->
  <path d="M120 84 L180 84" stroke="#272735" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- Server icon -->
  <rect x="176" y="64" width="32" height="40" rx="6" fill="#1A1A24" stroke="#3B7DFF" stroke-width="1.5"/>
  <circle cx="192" cy="78" r="3" fill="#3B7DFF"/>
  <rect x="184" y="88" width="16" height="2" rx="1" fill="#6ECC54"/>
  <!-- Floating sparkle -->
  <g transform="translate(188, 44)">
    <path d="M0 -8 L1.2 -3 L6 0 L1.2 3 L0 8 L-1.2 3 L-6 0 L-1.2 -3 Z" fill="#6ECC54"/>
  </g>
</svg>