<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="promptLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2060D0"/>
      <stop offset="100%" stop-color="#3B7DFF"/>
    </linearGradient>
    <filter id="glowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Transparent background mark for light surfaces -->
  <rect x="20" y="20" width="88" height="88" rx="18" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <path d="M42 52 L60 68 L42 84" fill="none" stroke="url(#promptLight)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="62" y="78" width="28" height="8" rx="4" fill="#4DA83A"/>
  <g transform="translate(92, 38)" filter="url(#glowLight)">
    <circle cx="0" cy="0" r="5" fill="#4DA83A"/>
    <path d="M0 -14 L1.8 -5.2 L10 0 L1.8 5.2 L0 14 L-1.8 5.2 L-10 0 L-1.8 -5.2 Z" fill="#4DA83A"/>
  </g>
</svg>