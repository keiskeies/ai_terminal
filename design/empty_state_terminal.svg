<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <defs>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D12"/>
      <stop offset="100%" stop-color="#13131B"/>
    </linearGradient>
  </defs>
  <!-- Terminal screen -->
  <rect x="32" y="20" width="176" height="120" rx="16" fill="url(#screenGrad)" stroke="#272735" stroke-width="1.5"/>
  <!-- Cursor blink block -->
  <rect x="52" y="58" width="10" height="18" rx="2" fill="#6ECC54">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Text lines -->
  <rect x="72" y="62" width="80" height="6" rx="3" fill="#272735"/>
  <rect x="52" y="88" width="120" height="6" rx="3" fill="#272735" opacity="0.6"/>
  <rect x="52" y="102" width="90" height="6" rx="3" fill="#272735" opacity="0.4"/>
  <!-- AI sparkle -->
  <g transform="translate(176, 52)">
    <circle cx="0" cy="0" r="4" fill="#3B7DFF"/>
    <path d="M0 -14 L1.8 -5.2 L10 0 L1.8 5.2 L0 14 L-1.8 5.2 L-10 0 L-1.8 -5.2 Z" fill="#3B7DFF" opacity="0.8"/>
  </g>
</svg>