name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.8'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        run: |
          cd ai_terminal
          flutter pub get
      - name: Generate code (build_runner)
        run: |
          cd ai_terminal
          dart run build_runner build --delete-conflicting-outputs
      - name: Build macOS
        run: |
          cd ai_terminal
          flutter build macos --release
      - name: Package macOS
        run: |
          cd ai_terminal/build/macos/Build/Products/Release
          zip -r -y ${{ github.workspace }}/AI_Terminal_${{ github.ref_name }}_macOS.zip "AI Terminal.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: AI_Terminal_${{ github.ref_name }}_macOS.zip

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        run: |
          cd ai_terminal
          flutter pub get
      - name: Generate code (build_runner)
        run: |
          cd ai_terminal
          dart run build_runner build --delete-conflicting-outputs
      - name: Build iOS (no codesign)
        run: |
          cd ai_terminal
          flutter build ios --release --no-codesign
      - name: Package iOS IPA
        run: |
          cd ai_terminal
          mkdir -p build/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ipa/Payload/
          cd build/ipa
          zip -r ${{ github.workspace }}/AI_Terminal_${{ github.ref_name }}_iOS.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: AI_Terminal_${{ github.ref_name }}_iOS.ipa

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        run: |
          cd ai_terminal
          flutter pub get
      - name: Generate code (build_runner)
        run: |
          cd ai_terminal
          dart run build_runner build --delete-conflicting-outputs
      - name: Patch Flutter Gradle settings
        run: |
          # Add gradlePluginPortal() to Flutter's settings.gradle.kts so kotlin-dsl plugin can be resolved
          FLUTTER_SDK="$(dirname "$(dirname "$(which flutter)")")"
          SETTINGS="$FLUTTER_SDK/packages/flutter_tools/gradle/settings.gradle.kts"
          echo "Patching $SETTINGS"
          if ! grep -q 'gradlePluginPortal' "$SETTINGS"; then
            sed -i.bak '/mavenCentral()/a\        gradlePluginPortal()' "$SETTINGS"
            echo "Patched successfully"
          else
            echo "Already patched"
          fi
      - name: Build Android APK
        run: |
          cd ai_terminal
          flutter build apk --release
      - name: Rename APK
        run: |
          cp ai_terminal/build/app/outputs/flutter-apk/app-release.apk AI_Terminal_${{ github.ref_name }}_Android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: AI_Terminal_${{ github.ref_name }}_Android.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install dependencies
        run: |
          cd ai_terminal
          flutter pub get
      - name: Generate code (build_runner)
        run: |
          cd ai_terminal
          dart run build_runner build --delete-conflicting-outputs
      - name: Build Windows
        run: |
          cd ai_terminal
          flutter build windows --release
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
      - name: Package Windows
        shell: pwsh
        run: |
          Compress-Archive -Path ai_terminal/build/windows/x64/runner/Release/* -DestinationPath AI_Terminal_${{ github.ref_name }}_Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: AI_Terminal_${{ github.ref_name }}_Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev ninja-build libgcrypt20-dev libsecret-1-dev libjsoncpp-dev
      - name: Install dependencies
        run: |
          cd ai_terminal
          flutter pub get
      - name: Generate code (build_runner)
        run: |
          cd ai_terminal
          dart run build_runner build --delete-conflicting-outputs
      - name: Build Linux
        run: |
          cd ai_terminal
          flutter build linux --release
      - name: Package Linux
        run: |
          cd ai_terminal/build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/AI_Terminal_${{ github.ref_name }}_Linux_x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: AI_Terminal_${{ github.ref_name }}_Linux_x64.tar.gz

  create-release:
    needs: [build-macos, build-ios, build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | head -20
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AI Terminal ${{ github.ref_name }}
          body: |
            ## AI Terminal ${{ github.ref_name }}

            **用自然语言操控服务器，AI 替你敲命令。**

            AI Terminal 是一款将 AI 助手与 SSH / 本地终端深度集成的跨平台应用。无论你是刚买服务器的小白、不想记命令的开发者、还是需要批量管理服务器的运维人员——打开它，用中文告诉 AI 你要干什么，它帮你连服务器、跑命令、装软件、查问题。全程安全可控。

            ### 🆕 v1.3.6 新功能 · AI 能力扩展 & 数据安全加固

            v1.3.6 聚焦 **AI 能力扩展**与**数据安全加固**，新增联网搜索、模型配置完善，并彻底修复了 macOS 开发模式下每次构建后数据丢失的关键 bug。

            #### 🔍 AI 联网搜索
            - **7 大搜索引擎**：Bing 网页抓取 / DuckDuckGo / Brave Search API / SearXNG 自托管 / Tavily / Bing API / SerpAPI
            - **完全免费方案**：Bing HTML 抓取 + DuckDuckGo 兜底，无需任何 API Key
            - **智能降级链**：主搜索引擎失败时自动切换备用引擎
            - **网页内容抓取**：`fetch_url` 工具按需抓取网页正文
            - **两级开关**：全局设置开关 + 每会话独立开关

            #### 🤖 AI 模型配置完善
            - **模型参数补全**：47 个预设模型补充 `max_tokens` / `context_window` / `supports_function_calling` 字段
            - **新增模型**：Kimi K3、Qwen3.8-max-preview
            - **备用模型修复**：修复下拉框无法选择/输入的 bug
            - **原生 Function Calling**：支持按模型开关，兼容小模型

            #### 🔐 macOS 数据安全修复（关键修复）
            - **根因**：ad-hoc 签名下每次构建 cdhash 变化 → Keychain 不可读 → 主密钥丢失 → 数据库被归档重建
            - **稳定密钥方案**：改用 `IOPlatformUUID` 派生 SHA-256 密钥，不依赖应用签名
            - **Dart 端密钥派生**：`Process.run('ioreg')` 绕开不稳定的平台通道
            - **历史数据自动恢复**：从 `.bak` 备份一次性恢复历史数据
            - **旧密钥兼容**：候选密钥列表尝试解密旧数据库

            ### 🆕 v1.3.5 新功能 · 运维能力大升级

            v1.3.5 是一次重大更新，新增**服务器监控**、**变更台账**、**运维工作流**、**通知中心**、**玻璃态 UI** 五大核心功能，全方位提升运维效率。

            #### 📊 服务器实时监控面板
            - **CPU / 内存 / 磁盘 / 网络** 四大核心指标实时刷新
            - **多主机并行监控**，一个面板看遍所有服务器状态
            - **按主机独立开关**，不想监控的机器可随时关闭
            - 异常指标自动高亮，一眼发现问题

            #### 📝 变更台账 & 审计日志
            - **自动记录所有 Agent 操作**：命令执行、文件修改、配置变更
            - **变更窗口管理**：计划内变更 vs 紧急变更，分类管理
            - **完整审计日志**：操作人、时间、命令、结果、退出码，全部可查
            - **变更回滚建议**：AI 自动分析变更影响，给出回滚方案

            #### 📋 运维工作流 (Runbook)
            - **内置常用运维模板**：系统巡检、安全加固、日志清理、服务部署等
            - **一键执行**：不用再一步步敲命令，工作流自动按步骤执行
            - **多机编排**：同一工作流可在多台服务器上并行/串行执行
            - **自定义工作流**：支持创建自己的运维手册，沉淀团队经验

            #### 🔔 通知中心
            - **任务完成提醒**：长任务跑完了第一时间通知你
            - **异常告警**：监控指标异常、命令执行失败，即时推送
            - **安全提醒**：高风险操作、可疑行为，提前预警
            - **可配置通知策略**：哪些事件需要通知，自己说了算

            #### 🎨 玻璃态 UI 重构
            - 全新 **GlassCard 玻璃态卡片**设计，视觉层次更清晰
            - **主题系统重构**，支持自定义主题色、圆角、模糊度
            - 更流畅的动画过渡，更细腻的交互反馈
            - **15+ 语言**本地化支持，一键切换

            #### 🔧 其他改进
            - Agent 总结输出支持 Markdown 渲染（标题、列表、加粗等格式）
            - 性能优化：终端渲染更流畅，长任务响应更及时
            - 修复若干已知问题，提升稳定性

            ### 🌟 适合谁用？

            - **小白 / 非技术人员**：不会命令行？没关系。"帮我装个 Docker"、"检查服务器漏洞"——一句话搞定
            - **开发者**：不用每次都百度同样的命令，AI 记得比你清楚
            - **运维 / DevOps**：告别重复 SSH，Agent 自动执行安装、配置、巡检；多机编排批量操作
            - **产品经理 / 一人公司**：技术合伙人的活，你一个人也能干

            ### 🚀 核心特性

            - 🤖 **Agent 智能执行**：AI 自动生成命令并循环执行（ReAct 框架），直到任务完成
            - 📊 **服务器监控**：CPU/内存/磁盘/网络实时监控面板，多主机并行
            - 📝 **变更台账**：完整审计日志，操作可追溯，变更可回滚
            - 📋 **运维工作流**：内置 Runbook 模板，一键执行常见运维任务
            - 🔔 **通知中心**：任务完成、异常告警、安全提醒，即时推送
            - 🎯 **多机编排**：单 Agent 调度多台主机，命令按 host 路由执行，状态实时回显
            - 🛡️ **三重安全防护**：行为边界提示词 → SafetyGuard 命令分级 → 危险操作需 CONFIRM 确认
            - 🔐 **零明文凭据**：密码/私钥存储在系统 Keychain / Keystore，永不明文落盘
            - 🧠 **知识库驱动**：内置 150+ 软件安装/配置指南，严格按官方文档执行，杜绝 AI 编造命令
            - 🛠️ **AI 工具调用**：SFTP 跨机上传、文件同步、经验记忆等非 shell 工具
            - 🖥️ **5 平台原生**：macOS / Linux / Windows / Android / iOS 全平台支持
            - 🌍 **15+ 语言**：中文/英文/日语/韩语/法语/德语/西班牙语/俄语/葡萄牙语等
            - 📡 **SSH 远程 + 本地终端**：连接池复用，多标签共享连接，切换零延迟
            - 🌊 **流式输出**：AI 响应实时渲染，终端命令即时回显
            - 🌐 **20+ AI 供应商**：DeepSeek / Qwen / Claude / Gemini / Ollama 等，支持远程配置更新
            - 💾 **会话持久化**：对话历史与结构化事件本地存储，切换会话不丢失上下文

            ### 🛡️ 安全设计

            - **密码存储**：系统级安全存储（macOS Keychain / Android Keystore），本地数据库只存元数据
            - **命令安全**：SafetyGuard 四级拦截——blocked 直接拦截、warn 需 CONFIRM 确认、info 低风险提示、safe 直接执行
            - **Agent 边界**：用户说"检查/查看"时只执行只读命令；禁止擅自安装/修改配置；发现问题先报告不自修
            - **变更审计**：所有 Agent 操作自动记录，支持审计追溯和回滚建议

            ### 📦 下载

            | 平台 | 文件 |
            |------|------|
            | macOS | `AI_Terminal_${{ github.ref_name }}_macOS.zip` |
            | iOS | `AI_Terminal_${{ github.ref_name }}_iOS.ipa` |
            | Android | `AI_Terminal_${{ github.ref_name }}_Android.apk` |
            | Windows | `AI_Terminal_${{ github.ref_name }}_Windows.zip` |
            | Linux x64 | `AI_Terminal_${{ github.ref_name }}_Linux_x64.tar.gz` |

            ### 🍎 macOS 安装须知

            由于本应用未经过 Apple 公证(非 App Store 分发),首次打开 macOS 会提示「无法验证开发者」。请按以下任一方式处理:

            **方式一:命令行(推荐,一行搞定)**
            ```bash
            xattr -cr "/Applications/AI Terminal.app"
            ```

            **方式二:右键打开**
            1. 解压 zip 后,将 `AI Terminal.app` 拖入 `/Applications`
            2. 在 Finder 中**右键**点击应用图标,选择「打开」
            3. 弹出对话框会多出「打开」按钮,点击即可
            4. 之后可正常打开,不会再提示

            ### 📖 文档

            - [官网](https://ai-terminal.keiskei.top)
            - [README（多语言）](https://github.com/keiskeies/ai_terminal#readme)
            - [常见问题](https://github.com/keiskeies/ai_terminal/blob/main/QUESTION.md)

            ---

            ## AI Terminal ${{ github.ref_name }}

            **Control your servers with natural language. AI runs the commands for you.**

            AI Terminal is a cross-platform app that deeply integrates an AI assistant with SSH and local terminals. Whether you're a beginner who just rented a VPS, a developer tired of googling commands, or a DevOps engineer managing dozens of servers — open it, tell the AI what you want in plain English (or Chinese), and it handles the rest. Safe, transparent, and under your control.

            ### 🆕 What's New in v1.3.6 · AI Capability Expansion & Data Security Hardening

            v1.3.6 focuses on **expanding AI capabilities** and **hardening data security** — adding web search, refining model configs, and permanently fixing the critical bug where macOS dev builds wiped the database after every `flutter build`.

            #### 🔍 AI Web Search
            - **7 search engines**: Bing HTML scraping / DuckDuckGo / Brave Search API / SearXNG self-hosted / Tavily / Bing API / SerpAPI
            - **Completely free option**: Bing HTML scraping + DuckDuckGo fallback, no API key required
            - **Smart fallback chain**: automatically switches to a backup engine on failure
            - **Web page fetching**: `fetch_url` tool grabs page content on demand
            - **Two-level toggle**: global settings switch + per-session toggle

            #### 🤖 AI Model Config Refinement
            - **Model params filled in**: added `max_tokens` / `context_window` / `supports_function_calling` for 47 preset models
            - **New models**: Kimi K3, Qwen3.8-max-preview
            - **Fallback model fix**: fixed a bug where the dropdown couldn't be selected or typed into
            - **Native Function Calling**: per-model toggle, compatible with smaller models

            #### 🔐 macOS Data Security Fix (Critical)
            - **Root cause**: ad-hoc signing changed cdhash each build → Keychain unreadable → master key lost → DB archived and rebuilt empty
            - **Stable key scheme**: derives SHA-256 key from `IOPlatformUUID`, independent of app signing
            - **Dart-side key derivation**: `Process.run('ioreg')` bypasses the unreliable platform channel
            - **Automatic data recovery**: one-time recovery of historical data from `.bak` backup
            - **Legacy key compat**: candidate-key list tries to decrypt old databases

            ### 🆕 What's New in v1.3.5 · Ops Capability Mega Upgrade

            v1.3.5 is a major update featuring **5 new core capabilities**: Server Monitoring, Change Records, Ops Runbooks, Notification Center, and Glassmorphism UI — a complete upgrade for DevOps efficiency.

            #### 📊 Real-time Server Monitoring Dashboard
            - **CPU / Memory / Disk / Network** — four core metrics refreshed in real-time
            - **Multi-host parallel monitoring** — view all your servers from one dashboard
            - **Per-host independent toggle** — turn off monitoring for any machine anytime
            - Auto-highlight abnormal metrics — spot issues instantly

            #### 📝 Change Records & Audit Logs
            - **Auto-log all Agent operations**: command execution, file changes, config modifications
            - **Change window management**: planned vs emergency changes, categorized
            - **Full audit logs**: operator, timestamp, command, result, exit code — all queryable
            - **Rollback suggestions**: AI analyzes change impact and recommends rollback plans

            #### 📋 Ops Runbooks
            - **Built-in common ops templates**: system inspection, security hardening, log cleanup, service deployment, and more
            - **One-click execution**: no more typing commands step by step — runbooks execute automatically
            - **Multi-host orchestration**: run the same workflow on multiple servers in parallel or sequentially
            - **Custom runbooks**: create your own ops playbooks and codify team knowledge

            #### 🔔 Notification Center
            - **Task completion alerts** — get notified the moment long-running tasks finish
            - **Anomaly alerts** — monitoring threshold breaches, command failures, pushed instantly
            - **Security reminders** — high-risk operations, suspicious behavior, early warnings
            - **Configurable notification policies** — you decide which events trigger notifications

            #### 🎨 Glassmorphism UI Redesign
            - Brand new **GlassCard glassmorphism card design** with clearer visual hierarchy
            - **Theme system refactor** — custom theme colors, corner radius, blur intensity
            - Smoother animated transitions, more refined interaction feedback
            - **15+ languages** with one-click switching

            #### 🔧 Other Improvements
            - Agent summary output supports Markdown rendering (headings, lists, bold, etc.)
            - Performance optimizations: smoother terminal rendering, faster long-task response
            - Various bug fixes and stability improvements

            ### 🌟 Who is this for?

            - **Beginners**: Never used a terminal? No problem. "Install Docker" or "check for vulnerabilities" — one sentence solves it
            - **Developers**: Stop googling the same commands. AI remembers them for you
            - **DevOps / SysAdmins**: Skip repetitive SSH sessions. Agent handles installs, configs, and health checks; orchestrate across multiple hosts
            - **PMs / Solo founders**: Run server operations without a dedicated engineer

            ### 🚀 Core Features

            - 🤖 **Agent Auto-Execution**: AI generates and executes commands in a ReAct loop until task completion
            - 📊 **Server Monitoring**: Real-time CPU/memory/disk/network dashboard, multi-host parallel
            - 📝 **Change Records**: Full audit logs, traceable operations, rollback-ready
            - 📋 **Ops Runbooks**: Built-in Runbook templates, one-click common ops tasks
            - 🔔 **Notification Center**: Task completion, anomaly alerts, security reminders — pushed instantly
            - 🎯 **Multi-Host Orchestration**: Single Agent dispatches commands across multiple hosts, routed by hostId, with live status feedback
            - 🛡️ **Triple Security**: Behavior boundary prompts → SafetyGuard command classification → Dangerous ops require CONFIRM
            - 🔐 **Zero Plaintext Credentials**: Passwords/keys in system Keychain / Keystore, never on disk
            - 🧠 **Knowledge-Driven**: 150+ software install/config guides, follows official docs strictly
            - 🛠️ **AI Tool Calling**: SFTP cross-host upload, file sync, experience memory and other non-shell tools
            - 🖥️ **5 Native Platforms**: macOS / Linux / Windows / Android / iOS
            - 🌍 **15+ Languages**: Chinese / English / Japanese / Korean / French / German / Spanish / Russian / Portuguese & more
            - 📡 **SSH Remote + Local Terminal**: Connection pooling, shared connections, zero-delay switching
            - 🌊 **Streaming Output**: Real-time AI responses and terminal output
            - 🌐 **20+ AI Providers**: DeepSeek / Qwen / Claude / Gemini / Ollama & more
            - 💾 **Session Persistence**: Conversation history and structured events stored locally, no context loss when switching sessions

            ### 🛡️ Security

            - **Credential Storage**: System-level secure storage (Keychain / Keystore), metadata only in local DB
            - **Command Safety**: SafetyGuard 4-level interception — blocked / warn (CONFIRM required) / info / safe
            - **Agent Boundaries**: Read-only for "check/inspect" requests; no unauthorized installs/modifications; report first, never self-fix
            - **Change Auditing**: All Agent operations automatically logged, with audit trail and rollback suggestions

            ### 📥 Downloads

            | Platform | File |
            |----------|------|
            | macOS | `AI_Terminal_${{ github.ref_name }}_macOS.zip` |
            | iOS | `AI_Terminal_${{ github.ref_name }}_iOS.ipa` |
            | Android | `AI_Terminal_${{ github.ref_name }}_Android.apk` |
            | Windows | `AI_Terminal_${{ github.ref_name }}_Windows.zip` |
            | Linux x64 | `AI_Terminal_${{ github.ref_name }}_Linux_x64.tar.gz` |

            ### 🍎 macOS Install Notice

            This app is **not notarized** (distributed outside the App Store). On first launch macOS will show "cannot verify the developer". Use one of the following methods:

            **Option 1: Command line (recommended, one-liner)**
            ```bash
            xattr -cr "/Applications/AI Terminal.app"
            ```

            **Option 2: Right-click open**
            1. Unzip and drag `AI Terminal.app` into `/Applications`
            2. In Finder, **right-click** the app icon → "Open"
            3. The dialog will show an extra "Open" button — click it
            4. Subsequent launches will not show the warning

