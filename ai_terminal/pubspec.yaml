name: ai_terminal
description: AI-Powered Cross-Platform Terminal
publish_to: 'none'
version: 1.3.5+9

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  # 国际化
  flutter_localizations:
    sdk: flutter
  intl: any
  # 状态管理
  flutter_riverpod: ^2.4.0
  # 路由
  go_router: ^12.0.0
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # 加密存储（系统级）
  flutter_secure_storage: ^9.0.0
  # 二次加密（可选增强）
  encrypt: ^5.0.1
  # 工具
  uuid: ^4.0.0
  collection: ^1.17.0
  # HTTP 客户端
  dio: ^5.4.0
  # 终端组件
  xterm: ^4.0.0
  # SSH 客户端
  dartssh2: ^2.8.2
  # Markdown 渲染
  flutter_markdown: ^0.6.18
  # 字体
  google_fonts: ^6.1.0
  # 生物识别
  local_auth: ^2.1.6
  # 获取应用版本
  package_info_plus: ^9.0.1
  # 文件选择
  file_picker: ^9.0.0
  # 文件监听（用于本地↔远端双向同步）
  watcher: ^1.1.0
  # SVG 渲染
  flutter_svg: ^2.0.9
  # 路径工具
  path: ^1.8.3
  # 字符编码支持 (GBK/BIG5)
  charset_converter: ^2.1.1
  # 本地 PTY（真正的伪终端，用于 macOS/Linux/Windows 本地终端）
  flutter_pty: ^0.4.2
  # SQLite 数据库（知识库 FTS5 全文搜索 + 应用主库）
  # sqflite_common_ffi ^2.4.0 支持 sqlite3 v3（hooks 机制，自动下载预编译库）
  # 通过 hooks 配置 sqlite3mc（SQLite3MultipleCiphers）启用全库加密
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.4.0
  sqlite3: ^3.0.0
  # 路径获取（知识库文件存储路径）
  path_provider: ^2.1.0
  # 图表（服务器监控面板的 CPU/内存/带宽折线图）
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true  # 启用 gen_l10n 国际化代码生成
  assets:
    - assets/icons/
    - assets/icons/logo_mark.svg
    - assets/icons/logo_wordmark.svg
    - assets/icons/logo_mark_light.svg
    - assets/knowledge/
    - assets/config/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  windows:
    generate: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#0A0A0F"
    theme_color: "#3B7DFF"
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

# 使用 SQLite3MultipleCiphers (sqlite3mc) 替代普通 SQLite
# sqlite3mc 兼容 SQLCipher 加密格式，支持全库加密（PRAGMA key）
# 同时兼容明文 DB（不执行 PRAGMA key 即为普通 SQLite 操作）
# 预编译库通过 hooks 自动从 GitHub releases 下载
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc
